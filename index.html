<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Simple Tabs</title>
  </head>
  <body>
    <div class="container">
      <div class="tabs">
        <div class="tab active" data-tab="1">First Tab</div>
        <div class="tab" data-tab="2">Second Tab</div>
        <div class="tab" data-tab="3">Thrid Tab</div>
        <div class="tab" data-tab="4">Fourth Tab</div>
      </div>
    </div>

    <div class="tab-content">
      <div class="tab-panel active" id="tab-1">
        <h2>First Tab</h2>
        <p>First Tab content to be displayed here</p>
      </div>

      <div class="tab-panel" id="tab-2">
        <h2>Second Tab</h2>
        <p>Second Tab content</p>
      </div>

      <div class="tab-panel" id="tab-3">
        <h2>Third Tab</h2>
        <p>Third Tab content</p>
      </div>

      <div class="tab-panel" id="tab-4">
        <h2>Fourth Tab</h2>
        <p>Fourth Tab content</p>
      </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
